<style>
  :root {    --bg: #f5f6f8; --card: #fff; --text: #1c1e21; --muted: #6b7280;

  }

  }
  * { box-sizing: border-box; }
  body {

    font: inherit; font-size: 14px; padding: 7px 14px; border-radius: 7px;

  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover:not(:disabled) { opacity: .9; color: #fff; }

    font: inherit; font-size: 13px; padding: 6px 8px; border-radius: 7px;
    border: 1px solid var(--line); background: var(--card); color: var(--text);

  .card {
    background: var(--card); border: 1px solid var(--line);

    font-size: 12px; text-transform: uppercase; letter-spacing: .06em;

  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));

  .item .label { font-size: 12px; color: var(--muted); }
  .item .value { font-size: 14px; word-break: break-all; }
  .notice {
    margin-top: 12px; padding: 9px 12px; border-radius: 7px; font-size: 13px;

  .hint.bad { color: var(--err); }

    height: 320px; overflow-y: auto; background: var(--bg);

let lang = localStorage.getItem("lang") || "ru";

function t(key, ...args) {
  const table = I18N[lang] || I18N.ru;
  let s = table[key] ?? I18N.ru[key] ?? key;
  args.forEach((a, i) => { s = s.replace("{" + i + "}", a); });
  return s;
}

function applyStatic() {
  document.documentElement.lang = lang;
  document.title = t("app.title");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
}

const langSelect = document.getElementById("lang");
langSelect.value = lang;
langSelect.addEventListener("change", () => {
  lang = langSelect.value;
  localStorage.setItem("lang", lang);
  applyStatic();
  redrawKeys();
  refresh();
});

// ---- api -----------------------------------------------------------------

const token = new URLSearchParams(location.search).get("t") || "";

async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: { "X-Token": token, "Content-Type": "application/json", ...(options.headers || {}) },
  });
  if (!res.ok) throw new Error((await res.text()).trim() || res.statusText);
  return res.status === 204 ? null : res.json();
}

const control = (action, value = "") =>
  api("/api/control", { method: "POST", body: JSON.stringify({ action, value }) });

// ---- settings form -------------------------------------------------------

const COMMON = [
  { key: "MODE", type: "select", options: ["history", "mtproto", "bot"] },
  { key: "SKUD_UNION_ID" },
  { key: "KEY_NAME" },
  { key: "SKUD_CONTRACT", hint: true },
  { key: "SKUD_PASSWORD", secret: true },
  { key: "SKUD_JWT", secret: true, hint: true },
  { key: "DEBUG", type: "check" },
];
const PER_MODE = {
  history: [
    { key: "SKUD_MAC", hint: true },
    { key: "POLL_INTERVAL", hint: true },
    { key: "LOOKBACK", hint: true },
    { key: "PROCESS_EXISTING", type: "check" },
  ],
  bot: [
    { key: "CHAT_ID", hint: true },
    { key: "TELEGRAM_TOKEN", secret: true },
  ],
  mtproto: [
    { key: "CHAT_ID", hint: true },
    { key: "API_ID", hint: true },
    { key: "API_HASH", secret: true },
    { key: "PHONE", hint: true },
    { key: "PASSWORD", secret: true, hint: true },
    { key: "SESSION_PATH", hint: true },
  ],
};

let loaded = { values: {}, secrets: {} };

function renderSettings() {
  const mode = document.getElementById("f-MODE")?.value || loaded.values.MODE || "history";
  const body = document.getElementById("settings-body");
  body.innerHTML = "";

  for (const f of [...COMMON, ...(PER_MODE[mode] || [])]) {
    const val = loaded.values[f.key] || "";
    const div = document.createElement("div");

    if (f.type === "check") {
      div.className = "field check";
      div.innerHTML = `<input type="checkbox" id="f-${f.key}"><label for="f-${f.key}"></label>`;
      div.querySelector("input").checked = ["1", "true", "yes", "on"].includes(val.toLowerCase());
      div.querySelector("label").textContent = t("f." + f.key);
    } else if (f.type === "select") {
      div.className = "field";
      div.innerHTML =
        `<label for="f-${f.key}"></label><select id="f-${f.key}">` +
        f.options.map(v => `<option value="${v}"></option>`).join("") + `</select>`;
      div.querySelector("label").textContent = t("f." + f.key);
      div.querySelectorAll("option").forEach((o, i) => {
        o.textContent = t("f." + f.key + "." + f.options[i]);
      });
      div.querySelector("select").value = val || "history";
      div.querySelector("select").addEventListener("change", () => {
        collectInto(loaded.values);
        renderSettings();
      });
    } else {
      div.className = "field";
      const isSet = f.secret && loaded.secrets[f.key];
      div.innerHTML =
        `<label for="f-${f.key}"></label>` +
        `<input type="${f.secret ? "password" : "text"}" id="f-${f.key}" autocomplete="off">` +
        (f.hint || isSet ? `<div class="hint"></div>` : "");
      div.querySelector("label").textContent = t("f." + f.key);
      const input = div.querySelector("input");
      if (!f.secret) input.value = val;
      else input.placeholder = isSet ? t("secret.unchanged") : "";
      const hint = div.querySelector(".hint");
      if (hint) hint.textContent = f.hint ? t("h." + f.key) : t("secret.hint");
    }
    body.appendChild(div);
  }
}

// collectInto copies the visible fields into target (secrets only when typed).
function collectInto(target) {
  const mode = document.getElementById("f-MODE")?.value || "history";
  for (const f of [...COMMON, ...(PER_MODE[mode] || [])]) {
    const el = document.getElementById("f-" + f.key);
    if (!el) continue;
    if (f.type === "check") target[f.key] = el.checked ? "1" : "";
    else if (!f.secret || el.value.trim() !== "") target[f.key] = el.value.trim();
  }
  return target;
}

document.getElementById("btn-settings").addEventListener("click", async () => {
  document.getElementById("settings-err").textContent = "";
  loaded = await api("/api/settings");
  loaded.values = loaded.values || {};
  loaded.secrets = loaded.secrets || {};
  renderSettings();
  document.getElementById("settings").showModal();
});

document.getElementById("settings-save").addEventListener("click", async () => {
  const err = document.getElementById("settings-err");
  err.textContent = "";
  try {
    await api("/api/settings", { method: "POST", body: JSON.stringify(collectInto({})) });
    document.getElementById("settings").close();
    refresh();
  } catch (e) {
    err.textContent = e.message;
  }
});

// ---- status --------------------------------------------------------------

const FIELDS = [
  ["st.mode", s => s.mode],
  ["st.uptime", s => s.running ? s.uptime : "-"],
  ["st.processed", s => s.running ? s.processed : "-"],
  ["st.token", s => s.running ? s.token : "-"],
  ["st.union", s => s.unionId || "-"],
  ["st.mac", s => s.mac || "-"],
  ["st.chat", s => s.chatId || "-"],
];

async function refresh() {
  let s;
  try {
    s = await api("/api/status");
  } catch (e) {
    document.getElementById("state").textContent = t("state.disconnected");
    return;
  }

  const dot = document.getElementById("dot");
  dot.className = "dot" + (s.running ? (s.paused ? " paused" : " running") : "");
  document.getElementById("state").textContent =
    t(s.running ? (s.paused ? "state.paused" : "state.running") : "state.stopped");

  // Never overwrite a name the user is in the middle of typing.
  if (!nameDirty && document.activeElement !== nameInput) {
    nameInput.value = s.keyName || "";
  }

  const status = document.getElementById("status");
  status.innerHTML = "";
  for (const [label, get] of FIELDS) {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<div class="label"></div><div class="value"></div>`;
    div.querySelector(".label").textContent = t(label);
    div.querySelector(".value").textContent = String(get(s) ?? "-");
    status.appendChild(div);
  }

  const missing = document.getElementById("missing");
  if (!s.running && s.missing && s.missing.length) {
    missing.hidden = false;
    missing.textContent =
      t("missing.prefix") + s.missing.map(c => t("miss." + c)).join(", ");
  } else {
    missing.hidden = true;
  }

  const lastErr = document.getElementById("lasterr");
  lastErr.hidden = !s.lastError;
  if (s.lastError) lastErr.textContent = t("lasterr.prefix") + s.lastError;

  const start = document.getElementById("btn-start");
  start.textContent = t(s.running ? "btn.stop" : "btn.start");
  start.dataset.action = s.running ? "stop" : "start";
  start.disabled = !s.running && s.missing && s.missing.length > 0;

  const pause = document.getElementById("btn-pause");
  pause.textContent = t(s.paused ? "btn.resume" : "btn.pause");
  pause.dataset.action = s.paused ? "resume" : "pause";
  pause.disabled = !s.running;

  const auth = document.getElementById("auth");
  if (s.prompt && !auth.open) {
    const isCode = s.prompt === "code";
    document.getElementById("auth-title").textContent =
      t(isCode ? "auth.code.title" : "auth.pass.title");
    document.getElementById("auth-label").textContent =
      t(isCode ? "auth.code.label" : "auth.pass.label");
    const input = document.getElementById("auth-value");
    input.type = isCode ? "text" : "password";
    input.value = "";
    document.getElementById("auth-err").textContent = "";
    auth.showModal();
    input.focus();
  } else if (!s.prompt && auth.open) {
    auth.close();
  }
}

document.getElementById("btn-start").addEventListener("click", async (e) => {
  e.target.disabled = true;
  try {
    await control(e.target.dataset.action || "start");
  } catch (err) {
    alert(err.message);
  }
  refresh();
});

document.getElementById("btn-pause").addEventListener("click", async (e) => {
  try {
    await control(e.target.dataset.action || "pause");
  } catch (err) {
    alert(err.message);
  }
  refresh();
});

document.getElementById("auth-submit").addEventListener("click", async () => {
  const input = document.getElementById("auth-value");
  const err = document.getElementById("auth-err");
  if (!input.value.trim()) { err.textContent = t("auth.empty"); return; }
  try {
    await api("/api/auth", { method: "POST", body: JSON.stringify({ value: input.value.trim() }) });
    document.getElementById("auth").close();
  } catch (e) {
    err.textContent = e.message;
  }
});

document.getElementById("auth-value").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("auth-submit").click(); }
});

// ---- key name ------------------------------------------------------------

const nameInput = document.getElementById("keyname");
const nameHint = document.getElementById("name-hint");
let nameDirty = false;

nameInput.addEventListener("input", () => { nameDirty = true; });
nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("btn-name").click(); }
});

document.getElementById("btn-name").addEventListener("click", async () => {
  const value = nameInput.value.trim();
  if (!value) {
    nameHint.className = "hint bad";
    nameHint.textContent = t("name.empty");
    return;
  }
  try {
    await control("set-name", value);
    nameDirty = false;
    nameHint.className = "hint saved";
    nameHint.textContent = t("name.saved", value);
  } catch (e) {
    nameHint.className = "hint bad";
    nameHint.textContent = e.message;
  }
  refresh();
});

// ---- key activity --------------------------------------------------------

const logEl = document.getElementById("log");
const keyEvents = [];

function keyRow(ev) {
  const row = document.createElement("div");
  row.className = "key " + (ev.status || "");
  row.innerHTML =
    `<span class="tag"></span><span class="val"></span>` +
    `<span class="as"></span><span class="when"></span>`;
  row.querySelector(".tag").textContent = t("tag." + ev.status);
  row.querySelector(".val").textContent = ev.key;
  row.querySelector(".as").textContent =
    ev.status === "skipped" ? t("skip." + ev.detail)
    : ev.status === "failed" ? ev.detail
    : ev.name ? t("key.as", ev.name) : "";
  row.querySelector(".when").textContent = new Date(ev.time).toLocaleTimeString();
  return row;
}

function redrawKeys() {
  logEl.innerHTML = "";
  if (!keyEvents.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = t("keys.empty");
    logEl.appendChild(empty);
    return;
  }
  for (const ev of keyEvents) logEl.appendChild(keyRow(ev));
  logEl.scrollTop = logEl.scrollHeight;
}

function appendKey(ev) {
  const atBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 30;
  if (!keyEvents.length) logEl.innerHTML = "";
  keyEvents.push(ev);
  logEl.appendChild(keyRow(ev));
  while (keyEvents.length > 500) { keyEvents.shift(); logEl.removeChild(logEl.firstChild); }
  if (atBottom) logEl.scrollTop = logEl.scrollHeight;
}

new EventSource("/api/keys?t=" + encodeURIComponent(token))
  .addEventListener("message", (e) => appendKey(JSON.parse(e.data)));

// ---- boot ----------------------------------------------------------------

applyStatic();
document.getElementById("state").textContent = t("state.connecting");
redrawKeys();
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
